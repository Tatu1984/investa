name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck · unit tests · audit
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production audit (high+ only)
        run: npm run audit:prod

      - name: Build (Next.js)
        run: npm run build

  e2e:
    name: e2e (Playwright, smoke)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
        env:
          # Seed needs the same env above
          NODE_ENV: test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start app + run e2e
        run: |
          npm start &
          PID=$!
          # Wait for the server to come up
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/v1/health > /dev/null && break
            sleep 1
          done
          npx playwright test
          kill $PID || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
